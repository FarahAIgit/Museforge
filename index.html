      .advanced-options {
    margin-top: 20px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 14px;
    overflow: hidden;
}

.advanced-options summary {
    padding: 16px 20px;
    cursor: pointer;
    font-weight: 600;
    color: #e2e8f0;
    list-style: none;
}

.advanced-options summary::-webkit-details-marker {
    display: none;
}

.advanced-options summary::after {
    content: "▼";
    float: right;
    transition: transform 0.2s ease;
}

.advanced-options[open] summary::after {
    transform: rotate(180deg);
}

.advanced-content {
    padding: 0 20px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
}

.advanced-content label {
    display: block;
    font-size: 0.8rem;
    color: #64748b;
    margin-bottom: 4px;
}

.advanced-content input {
    width: 100%;
    box-sizing: border-box;
    background: #1e2937;
    border: 1px solid #334155;
    color: #e0e7ff;
    padding: 10px;
    border-radius: 8px;
}

.advanced-help {
    padding: 0 20px 20px;
    font-size: 0.75rem;
    color: #64748b;

}
        .output-container {

        .generated-images {

        .generated-images img {

        .image-actions {

        .download-btn {

            border-radius: 9999px;

    </style>
</head>
<body>
    <div class="container">

        <div class="card">

    <div class="mode-toggle">

</div>

<!-- Advanced Options -->
<details class="advanced-options">

    <div class="advanced-content">

</details>

            <!-- Prompt Output -->
            <div class="output-container">
                <div class="output-label">
                    <span>Generated Prompt</span>
                    <span class="badge" id="mode-badge">SFW</span>
                </div>
                
                <div class="prompt-box" id="prompt-output">
                    Click "Forge Prompt" to create a new prompt...

                <button onclick="copyPrompt()" class="copy-btn">

                <!-- Image Generation Buttons -->
                <div id="image-generation-buttons" style="display: none; margin-top: 16px;">
                    <button id="grok-btn" onclick="generateWithGrok(this)" class="grok-btn">
                        🖼️ Generate with Grok

                    <button id="chatgpt-btn" onclick="generateWithChatGPT(this)" class="chatgpt-btn">
                        🖼️ Generate with ChatGPT

            </div>

            <!-- Breakdown -->
            <div class="breakdown" id="breakdown-section" style="display:none;">

        <footer>

    <script>
        const pools = {
            sfw_photo: ["closeup selfie", "full length mirror selfie holding phone", "instax photo", "studio portrait style", "in casual smartphone style", "mirror selfie holding phone", "full body mirror selfie holding phone"],
            nsfw_photo: ["vhs porn style", "thirst trap mirror selfie holding phone", "style seductive mirror selfie holding phone", "horny candid photo"],
            lighting: ["harsh flash", "dim indoor lighting", "natural window light", "warm lamp light", "cool overhead lighting", "poor lighting", "soft natural light", "harsh bathroom lighting", "yellowish indoor light", "low light with noise", "bright direct flash", "mixed lighting"],
            ethnicity: ["Caucasian", "East Asian", "Korean", "Japanese", "Chinese", "Southeast Asian", "Indian", "Pakistani", "Persian", "Levantine", "North African", "West African", "East African", "Afro-Caribbean", "Black", "Mexican", "Brazilian", "Indigenous", "Mixed heritage"],
            hair_colour: ["black", "deep brown", "warm brown", "golden blonde", "light brown"],
            hairstyle: ["long straight hair", "long wavy hair", "shoulder-length wavy hair", "short bob haircut", "long curly hair", "messy bun", "high ponytail", "loose waves", "straight sleek hair", "layered medium hair", "pixie cut", "braided hair", "half-up half-down style", "voluminous curls", "wet look straight hair"],
            eye_colour: ["deep brown", "hazel", "emerald green", "bright blue", "amber"],
            eye_shape: ["almond-shaped", "large and expressive", "hooded"],
            face_shape: ["heart-shaped face", "oval face", "round face"],
            nose: ["small straight nose", "delicate button nose"],
            lips: ["full plump lips", "soft natural lips"],
            cheeks_jaw: ["soft rounded cheeks", "defined yet soft jawline"],
            additional_face: ["visible pores and texture", "light freckles"],
            woman_desc: ["beautiful", "attractive", "cute", "average-looking", "soft-featured average"],
            sfw_style: ["alt girl", "goth girl", "preppy girl", "boho girl", "girl-next-door", "soft girl", "clean girl", "coquette girl", "indie girl", "y2k girl", "artsy girl", "cottagecore girl", "street style girl", "minimalist girl", "romantic girl", "sporty girl", "vintage girl", "grunge girl", "e-girl", "academia girl", "fairycore girl", "coastal girl", "tomboy girl", "elegant girl", "dreamy girl"],
            nsfw_style: ["seductive alt girl", "goth temptress", "sultry girl-next-door"],
            sfw_pose: ["warm smiling at camera", "natural relaxed pose", "gentle head tilt with soft smile", "soft direct gaze with relaxed expression", "confident but soft posture", "relaxed hand resting near chin", "slight head tilt with warm expression", "calm and composed pose", "playful but direct expression", "leaning in slightly toward camera", "three-quarter view with soft eye contact", "subtle smile with gentle posture"],
            nsfw_pose: ["seductive pose with hand on hip", "sultry bedroom eyes half-lidded", "sitting with legs spread", "grabbing her breasts", "hand in panties", "pulling her nipples"],
            body_type: ["voluptuous hourglass figure", "curvy thick body", "soft pear-shaped figure", "full apple-shaped body", "slim thick figure", "soft curvy body", "chubby soft figure", "athletic toned body", "petite curvy frame", "thick hourglass figure", "soft rectangular body", "full-figured soft body", "curvy with a soft stomach", "voluptuous with wide hips", "skinny lithe frame", "slim and delicate build", "petite slim figure", "bimbo-style exaggerated curves", "curvy bimbo figure", "toned athletic body", "soft and plump figure", "lean and slender build"],
            breasts: ["small natural breasts", "flat chest", "modest small breasts", "soft average breasts", "slightly saggy breasts", "small saggy breasts", "full natural breasts", "large natural breasts", "heavy breasts with some sag", "perky C-cup breasts", "full D-cup breasts", "large round breasts", "heavy sagging breasts", "soft heavy breasts", "voluptuous breasts", "tiny flat breasts", "tiny saggy breasts"],
            areola: ["small pink areolas", "small brown areolas", "large dark areolas", "puffy pink areolas", "prominent areolas", "soft brown areolas", "large puffy areolas", "small sensitive areolas"],
            lower_body: ["wide hips and thick juicy thighs", "Saddlebag hips", "fat ass", "round bubble butt"],
            nsfw_clothing: ["tiny lace panties", "sheer panties", "micro thong", "high-cut panties", "cheeky panties", "boyshorts", "g-string", "loose panties", "small and baggy panties", "strappy panties", "wet look panties", "lace thong", "seamless panties", "ripped panties", "tiny bikini panties", "sexy lingerie set", "sheer bodysuit", "fishnet stockings with panties", "strappy lingerie", "leather lingerie"]
        };

        const SHOW_IMAGE_GENERATION = true;
        let currentMode = 'sfw';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('sfw-btn').classList.toggle('active', mode === 'sfw');
            document.getElementById('nsfw-btn').classList.toggle('active', mode === 'nsfw');
            document.getElementById('mode-badge').textContent = mode.toUpperCase();

            const imageButtons = document.getElementById('image-generation-buttons');
            imageButtons.style.display = (SHOW_IMAGE_GENERATION && mode === 'sfw') ? 'block' : 'none';
        }

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generatePrompt() {
            const photoPool = currentMode === 'sfw' ? pools.sfw_photo : pools.nsfw_photo;

            let stylePool;
            let posePool;

            if (currentMode === 'sfw') {
                stylePool = pools.sfw_style;
                posePool = pools.sfw_pose;
            } else {
                stylePool = [...pools.sfw_style, ...pools.nsfw_style];
                posePool = [...pools.sfw_pose, ...pools.nsfw_pose];
            }

            // Advanced Overrides
            const overrideStyle = document.getElementById('override-style').value.trim();
            const overridePose = document.getElementById('override-pose').value.trim();
            const overrideHair = document.getElementById('override-hair').value.trim();
            const overrideBody = document.getElementById('override-body').value.trim();

            const lighting = getRandom(pools.lighting);
            const photo = `amateur ${getRandom(photoPool)} with ${lighting}`;

            const ethnicity = getRandom(pools.ethnicity);
            const womanDesc = getRandom(pools.woman_desc);

            const faceShape = getRandom(pools.face_shape);
            const eyeColour = getRandom(pools.eye_colour);
            const eyeShape = getRandom(pools.eye_shape);
            const nose = getRandom(pools.nose);
            const lips = getRandom(pools.lips);
            const cheeksJaw = getRandom(pools.cheeks_jaw);
            const extra = getRandom(pools.additional_face);
            const hairColour = getRandom(pools.hair_colour);

            let hairDescription = overrideHair || (Math.random() < 0.7 
                ? `${getRandom(pools.hairstyle)} in ${hairColour}` 
                : `${hairColour} hair`);

            let faceDesc = `${faceShape}, ${cheeksJaw}, ${nose}, ${lips}, ${extra}, her eyes are ${eyeColour} and ${eyeShape}, ${hairDescription}`;

            let bodyPart = '';
            if (currentMode === 'nsfw') {
                const bodyType = getRandom(pools.body_type);
                const breasts = getRandom(pools.breasts);
                const areola = getRandom(pools.areola);
                const lowerBody = getRandom(pools.lower_body);
                const clothing = getRandom(pools.nsfw_clothing);

                bodyPart = overrideBody 
                    ? `, ${overrideBody}` 
                    : `, ${bodyType} with ${breasts}, ${areola}, ${lowerBody} wearing ${clothing}`;
            }

            const style = overrideStyle || getRandom(stylePool);
            const pose = overridePose || getRandom(posePool);

            const prompt = `${photo} of a ${womanDesc} ${ethnicity} woman with ${faceDesc}, ${bodyPart}, ${style}, ${pose}, natural skin with visible pores and subtle texture`;

            document.getElementById('prompt-output').innerHTML = prompt;
            document.getElementById('mode-badge').textContent = currentMode.toUpperCase();

            showBreakdown({
                photo, ethnicity, womanDesc, faceShape, eyeColour, eyeShape,
                nose, lips, cheeksJaw, hairColour, style, pose, bodyPart
            });
        }

        function showBreakdown(data) {
            const grid = document.getElementById('breakdown-grid');
            grid.innerHTML = '';

            const items = [
                { label: 'Photo Style', value: data.photo },
                { label: 'Ethnicity', value: data.ethnicity },
                { label: 'Descriptor', value: data.womanDesc },
                { label: 'Face Shape', value: data.faceShape },
                { label: 'Cheeks & Jaw', value: data.cheeksJaw },
                { label: 'Eyes', value: `her eyes are ${data.eyeColour} and ${data.eyeShape}` },
                { label: 'Hair', value: data.hairColour + ' hair' },
                { label: 'Nose / Lips', value: `${data.nose} • ${data.lips}` },
                { label: 'Style', value: data.style },
                { label: 'Pose', value: data.pose }
            ];

            if (data.bodyPart) {
                items.push({ label: 'Body (NSFW)', value: data.bodyPart.replace(/^,\s*/, '') });
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'breakdown-item';
                div.innerHTML = `
                    <div class="breakdown-label">${item.label}</div>
                    <div style="color:#e0e7ff;">${item.value}</div>
                `;
                grid.appendChild(div);
            });

            document.getElementById('breakdown-section').style.display = 'block';
        }

        function copyPrompt() {
            const promptText = document.getElementById('prompt-output').innerText;
            if (!promptText || promptText.includes('Click "Forge Prompt')) {
                alert('Please generate a prompt first!');
                return;
            }

            navigator.clipboard.writeText(promptText).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.innerText;
                btn.innerText = '✅ Copied!';
                setTimeout(() => btn.innerText = original, 2000);
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = promptText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('Prompt copied!');
            });
        }

        async function generateWithGrok(btn) {
            await generateImage(btn, '/api/generate-image', 'Grok');
        }

        async function generateWithChatGPT(btn) {
            await generateImage(btn, '/api/generate-image-chatgpt', 'ChatGPT');
        }

        async function generateImage(btn, endpoint, provider) {
            const promptText = document.getElementById('prompt-output').innerText;
            if (!promptText || promptText.includes('Click "Forge Prompt')) {
                alert('Please generate a prompt first!');
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = `⏳ Generating with ${provider}...`;
            btn.disabled = true;

            document.querySelectorAll('.generated-images').forEach(el => el.remove());

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText, n: 2 })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || `Failed to generate with ${provider}`);
                }

                let images = data.images || [];
                if (images.length === 0) {
                    throw new Error('No images returned from the server');
                }

                displayImages(images, `Generated with ${provider}`);

            } catch (e) {
                console.error(`${provider} Error:`, e);
                alert(`Error generating with ${provider}: ${e.message}`);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function displayImages(images, title) {
            document.querySelectorAll('.generated-images').forEach(el => el.remove());

            const container = document.createElement('div');
            container.className = 'generated-images';

            let html = `<strong style="display:block; margin-bottom:12px; color:#94a3b8;">${title}</strong>`;

            images.forEach((imgSrc, index) => {
                if (!imgSrc) return;
                const src = (typeof imgSrc === 'object' && imgSrc.url) ? imgSrc.url : imgSrc;

                html += `
                    <div style="margin-bottom: 20px;">
                        <img src="${src}" 
                             style="width:100%; max-width:320px; border-radius:16px; border:1px solid #334155; display:block;"
                             alt="Generated image ${index + 1}">
                        <div class="image-actions">
                            <button onclick="downloadImage('${src}', ${index})" class="download-btn">
                                ⬇️ Download
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            const buttonsContainer = document.getElementById('image-generation-buttons');
            buttonsContainer.parentNode.appendChild(container);
        }

        function downloadImage(src, index) {
            const link = document.createElement('a');
            link.href = src;
            link.download = `muse-forge-\( {Date.now()}- \){index + 1}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = function() {
            setMode('sfw');
            setTimeout(() => generatePrompt(), 600);
        };
    </script>
</body>
</html>
